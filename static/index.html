<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Claude">
<title>Claude Launcher</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/app.css?v=3">
</head>
<body>

<div class="net-banner" id="net-banner">
  <div class="net-dot"></div>
  <span id="net-banner-msg"></span>
</div>

<header>
  <div>
    <h1>⚡ Claude Launcher</h1>
    <div class="header-meta">
      <span class="header-sub" id="ip-hint">局域网 · 加载中...</span>
      <span class="net-pill" id="net-pill">
        <span class="dot"></span>
        <span id="net-pill-text" data-i18n="net_checking">检测中</span>
      </span>
    </div>
  </div>
  <button class="gear-btn" id="gear-btn" aria-label="Settings">⚙</button>
</header>

<div class="tab-bar">
  <button class="tab-item active" id="tab-favorites" data-tab="favorites">⭐ 收藏</button>
  <button class="tab-item" id="tab-all" data-tab="all">🌐 全部</button>
</div>

<!-- Favorites tab content -->
<main id="main">
  <div class="empty" data-i18n="empty_loading">加载中...</div>
</main>

<!-- All tab content -->
<div id="projects-view" style="display:none">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="project-search" placeholder="搜索项目路径...">
      <button class="search-clear" id="search-clear-btn">✕</button>
    </div>
  </div>
  <div id="projects-list"></div>
</div>

<!-- Session list panel (level 2) -->
<div class="slide-panel" id="sess-panel">
  <div class="panel-nav">
    <button class="panel-back" id="sess-back">‹ 全部</button>
    <div class="panel-title" id="sess-title"></div>
    <button class="panel-action primary" id="sess-new-btn">+ 新建</button>
  </div>
  <div class="panel-subpath" id="sess-path"></div>
  <div style="padding:4px 16px 32px" id="sess-list"></div>
</div>

<!-- Message viewer panel (level 3) -->
<div class="slide-panel on-top" id="msg-panel">
  <div class="panel-nav">
    <button class="panel-back" id="msg-back">‹ 会话列表</button>
    <div class="panel-title" id="msg-title"></div>
    <button class="panel-action ghost" id="msg-resume-btn">恢复会话</button>
  </div>
  <div class="msg-session-info" id="msg-info"></div>
  <div class="msg-list" id="msg-list"></div>
  <div class="msg-input-bar" id="msg-input-bar">
    <textarea id="msg-input" rows="1" placeholder="输入消息..."></textarea>
    <button id="msg-send-btn" class="msg-send-btn">发送</button>
  </div>
</div>

<!-- Settings bottom sheet (rendered by settings.js) -->
<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet" id="settings-sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script src="/i18n.js"></script>
<script src="/settings.js"></script>
<script src="/app.js"></script>
</body>
</html>
